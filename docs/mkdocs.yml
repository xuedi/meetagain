site_name: MeetAgain — Developer Docs
site_description: Documentation for developers building plugins on or contributing to MeetAgain
docs_dir: src
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.instant
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list

nav:
  - Home:
    - index.md
    - Getting Started: getting-started.md
    - Hosting: hosting.md
  - Core Development:
    - core-development/index.md
    - Architecture: core-development/architecture.md
    - Patterns: core-development/patterns.md
    - Frontend: core-development/frontend.md
    - Data Fixtures: core-development/fixtures.md
    - Testing: core-development/testing.md
    - Best Practices: core-development/best-practices.md
    - Troubleshooting: core-development/troubleshooting.md
  - Plugin Development:
    - plugin-development/index.md
    - Quick Start: plugin-development/quick-start.md
    - Reference:
      - Required Hooks: plugin-development/required-hooks.md
      - Optional Hooks: plugin-development/optional-hooks.md
    - Guides:
      - Architecture: plugin-development/architecture.md
      - Best Practices: plugin-development/best-practices.md
      - Testing: plugin-development/testing.md
    - Troubleshooting: plugin-development/troubleshooting.md
  - Contributing: contributing.md
