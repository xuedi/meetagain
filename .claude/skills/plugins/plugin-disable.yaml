name: plugin-disable
description: Disable a plugin
model: haiku
category: plugins

arguments:
  - name: plugin
    description: Plugin name to disable (e.g., "dishes", "multisite", "glossary")
    required: true

steps:
  - task:
      subagent_type: Bash
      model: haiku
      description: Disable plugin
      prompt: |
        Disable plugin:

        1. Run: just plugin-disable {{ plugin }}

        Return a summary including:
        - Plugin disabled status
        - Any warnings or errors
        - Data persistence note

        Format as:
        ```
        Plugin Disable: {{ plugin }}
        ============================
        Status: DISABLED/FAILED

        [If errors: list them]

        Note: Plugin data remains in database.
        To remove data, manually drop plugin tables or reset database.
        ```

examples:
  - description: Disable a plugin
    command: /plugin-disable <plugin-name>

  - description: List available plugins
    command: Check plugins/ directory for available plugins
