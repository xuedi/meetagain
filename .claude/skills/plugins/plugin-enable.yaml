name: plugin-enable
description: Enable a plugin and run migrations
model: haiku
category: plugins

arguments:
  - name: plugin
    description: Plugin name to enable (e.g., "dishes", "multisite", "glossary")
    required: true

steps:
  - task:
      subagent_type: Bash
      model: haiku
      description: Enable plugin
      prompt: |
        Enable plugin and run migrations:

        1. Run: just plugin-enable {{ plugin }}
        2. Check migration status

        Return a summary including:
        - Plugin enabled status
        - Migrations run (if any)
        - Any warnings or errors
        - Next steps (if applicable)

        Format as:
        ```
        Plugin Enable: {{ plugin }}
        ===========================
        Status: ENABLED/FAILED

        Migrations:
        [List migrations run, or "No migrations needed"]

        [If errors: list them]

        Next Steps:
        - Run: just devModeFixtures to load plugin fixtures (if needed)
        - Check plugin documentation in plugins/{{ plugin }}/CLAUDE.md
        ```

examples:
  - description: Enable a plugin
    command: /plugin-enable <plugin-name>

  - description: List available plugins
    command: Check plugins/ directory for available plugins
