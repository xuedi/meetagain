name: reset-dev
description: Reset development environment with fixtures
model: haiku
category: database

arguments:
  - name: plugin
    description: Optional plugin name to enable (e.g., "multisite", "dishes")
    required: false
    default: ""

steps:
  - task:
      subagent_type: Bash
      model: haiku
      description: Reset dev environment
      prompt: |
        Reset development environment with fixtures:

        {% if plugin %}
        1. Run: just devModeFixtures {{ plugin }}
        {% else %}
        1. Run: just devModeFixtures
        {% endif %}

        Return a summary including:
        - Database reset status
        - Fixtures loaded
        - Plugins enabled (if applicable)
        - Any warnings or errors

        Format as:
        ```
        Dev Environment Reset
        =====================
        Database: RESET
        Fixtures: LOADED
        {% if plugin %}
        Plugin Enabled: {{ plugin }}
        {% endif %}

        Status: SUCCESS/FAILED
        [If errors: list them]
        ```

examples:
  - description: Reset dev environment with all plugins
    command: /reset-dev

  - description: Reset with specific plugin enabled
    command: /reset-dev <plugin-name>
