name: cache-clear
description: Clear Symfony cache for specified environment
model: haiku
category: database

arguments:
  - name: env
    description: Environment to clear cache for (dev, test, prod)
    required: false
    default: "dev"

steps:
  - task:
      subagent_type: Bash
      model: haiku
      description: Clear Symfony cache
      prompt: |
        Clear Symfony cache:

        1. Run: just app cache:clear --env={{ env }}

        Return a concise summary including:
        - Environment cleared
        - Cache clearing status
        - Any warnings or errors

        Format as:
        ```
        Cache Clear
        ===========
        Environment: {{ env }}
        Status: SUCCESS/FAILED

        [If errors: list them]
        ```

examples:
  - description: Clear dev cache
    command: /cache-clear

  - description: Clear test cache
    command: /cache-clear test

  - description: Clear prod cache
    command: /cache-clear prod
