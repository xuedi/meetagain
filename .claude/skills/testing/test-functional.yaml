name: test-functional
description: Run functional tests efficiently with Haiku model and return formatted results
model: haiku
category: testing

arguments:
  - name: filter
    description: Optional test class or path filter (e.g., "LoginTest")
    required: false
    default: ""

steps:
  - task:
      subagent_type: Bash
      model: haiku
      description: Run functional tests
      prompt: |
        Execute PHPUnit functional tests and return results:

        {% if filter %}
        1. Run: just testFunctional {{ filter }}
        {% else %}
        1. Run: just testFunctional
        {% endif %}
        2. Run: just testResults

        Return a concise summary including:
        - Total tests run
        - Pass/fail counts
        - Runtime
        - If failures exist: list them with file:line
        - Overall status (PASSED/FAILED)

        Format as:
        ```
        Functional Tests: X tests, Y assertions
        Status: PASSED/FAILED
        Runtime: N.NNNs

        [If failures:]
        Failures:
        - TestClass::testMethod (path/to/file.php:123)
          Error details
        ```

examples:
  - description: Run all functional tests
    command: /test-functional

  - description: Run specific test class
    command: /test-functional LoginTest
