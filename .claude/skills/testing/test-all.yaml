name: test-all
description: Run complete test suite (unit + functional + all checks) with coverage
model: haiku
category: testing

steps:
  - task:
      subagent_type: Bash
      model: haiku
      description: Run full test suite
      prompt: |
        Execute complete test suite:

        1. Run: just test
        2. Run: just testResults

        Return comprehensive summary:
        - Unit tests: count, status
        - Functional tests: count, status
        - Code coverage percentage
        - Mago checks: pass/fail
        - Overall runtime
        - Final status (PASSED/FAILED)

        Format as:
        ```
        Complete Test Suite Results
        ===========================
        Unit Tests: X tests, Y assertions - STATUS
        Functional Tests: X tests, Y assertions - STATUS
        Coverage: XX.X%
        Mago Checks: PASSED/FAILED
        Runtime: N.NNNs

        Overall: PASSED/FAILED

        [If failures exist, list them]
        ```

examples:
  - description: Run complete test suite with coverage
    command: /test-all
