name: test-unit
description: Run unit tests efficiently with Haiku model and return formatted results
model: haiku
category: testing

arguments:
  - name: filter
    description: Optional test class or path filter (e.g., "EventServiceTest" or "Service/")
    required: false
    default: ""

steps:
  - task:
      subagent_type: Bash
      model: haiku
      description: Run unit tests
      prompt: |
        Execute PHPUnit unit tests and return results:

        {% if filter %}
        1. Run: just testUnit {{ filter }}
        {% else %}
        1. Run: just testUnit
        {% endif %}
        2. Run: just testResults

        Return a concise summary including:
        - Total tests run
        - Pass/fail counts
        - Runtime
        - If failures exist: list them with file:line
        - Overall status (PASSED/FAILED)

        Format as:
        ```
        Unit Tests: X tests, Y assertions
        Status: PASSED/FAILED
        Runtime: N.NNNs

        [If failures:]
        Failures:
        - TestClass::testMethod (path/to/file.php:123)
          Expected X, got Y
        ```

examples:
  - description: Run all unit tests
    command: /test-unit

  - description: Run specific test class
    command: /test-unit EventServiceTest

  - description: Run tests in specific directory
    command: /test-unit Service/
