name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          extensions: gd, apcu, intl, redis

      - name: Cache Composer packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Setup config
        run: |
          cp config/plugins.dist.php config/plugins.php
          cp .env.dist .env
          echo "REDIS_URL=redis://127.0.0.1:6379" >> .env
          sudo rm -rf /var/www/html && sudo ln -s $GITHUB_WORKSPACE /var/www/html

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run unit tests
        run: vendor/bin/phpunit -c tests/config/phpunit.xml --testsuite=default --no-coverage

  functional:
    name: Functional Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9.7@sha256:c9e48b0c008f1936d4139d1c0dcd5950a9dbe57d4d40f383013cde432fa6d6aa
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: meetAgain_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=5
      redis:
        image: redis:8@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          extensions: gd, apcu, pdo_mysql, imagick, intl, opcache, redis

      - name: Cache Composer packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Setup plugins
        run: |
          cp config/plugins.dist.php config/plugins.php
          cp config/plugins_test.dist.php config/plugins_test.php

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Install Sass
        run: npm install -g sass

      - name: Build assets
        run: |
          cp assets/styles/_config.scss.dist assets/styles/_config.scss
          php bin/console sass:build

      - name: Setup test environment
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/meetAgain_test
          REDIS_URL: redis://127.0.0.1:6379
        run: |
          cp .env.dist .env
          echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/meetAgain_test" >> .env
          echo "REDIS_URL=redis://127.0.0.1:6379" >> .env
          echo "APP_ENV=test" >> .env
          php bin/console doctrine:schema:create --no-interaction
          php bin/console doctrine:fixtures:load --no-interaction --group=install
          php bin/console doctrine:fixtures:load --no-interaction --append --group=base
          php bin/console app:plugin:pre-fixtures
          php bin/console app:fixtures:load --no-interaction --append --group=plugin
          php bin/console app:plugin:post-fixtures

      - name: Run functional tests
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/meetAgain_test
          REDIS_URL: redis://127.0.0.1:6379
        run: vendor/bin/phpunit -c tests/config/phpunit.xml --testsuite=functional --no-coverage

  checks:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          extensions: gd, apcu, intl

      - name: Cache Composer packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Setup config
        run: |
          cp config/plugins.dist.php config/plugins.php
          cp .env.dist .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Validate composer
        run: composer validate --strict

      - name: Mago
        run: vendor/bin/mago --config tests/config/mago.toml lint
