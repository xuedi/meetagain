name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8@sha256:0a972391db0b24ec336e35d1bc98b237237e26f82bf5120cf2f6b1688d1df973
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: gd, apcu, intl, redis

      - name: Cache Composer packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Setup config
        run: |
          cp config/plugins.dist.php config/plugins.php
          cp .env.dist .env
          echo "REDIS_URL=redis://127.0.0.1:6379" >> .env
          sudo rm -rf /var/www/html && sudo ln -s $GITHUB_WORKSPACE /var/www/html

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run unit tests
        run: vendor/bin/phpunit -c tests/config/phpunit.xml --testsuite=default --no-coverage

  functional:
    name: Functional + Smoke Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9.7@sha256:e370cd5f64599d46985b7729b452f2153825246f88d82753ec595c5dfc6fef6a
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: meetAgain_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=5
      redis:
        image: redis:8@sha256:0a972391db0b24ec336e35d1bc98b237237e26f82bf5120cf2f6b1688d1df973
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=5

    env:
      # Base dbname only - doctrine.yaml's when@test block appends `_test%TEST_TOKEN%`,
      # so the effective DB is meetAgain_test (phpunit) / meetAgain_testN (paratest workers).
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/meetAgain
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: gd, apcu, pdo_mysql, imagick, intl, opcache, redis

      - name: Cache Composer packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Setup plugins
        run: |
          cp config/plugins.dist.php config/plugins.php
          cp config/plugins_test.dist.php config/plugins_test.php

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Install Sass
        run: npm install -g sass

      - name: Build assets
        run: |
          cp assets/styles/_config.scss.dist assets/styles/_config.scss
          php bin/console sass:build

      - name: Setup test environment
        run: |
          cp .env.dist .env
          echo "DATABASE_URL=${DATABASE_URL}" >> .env
          echo "REDIS_URL=${REDIS_URL}" >> .env
          echo "APP_ENV=test" >> .env
          php bin/console doctrine:schema:create --no-interaction
          php bin/console doctrine:fixtures:load --no-interaction --group=install
          php bin/console doctrine:fixtures:load --no-interaction --append --group=base
          php bin/console app:plugin:pre-fixtures
          php bin/console app:fixtures:load --no-interaction --append --group=plugin
          php bin/console app:plugin:post-fixtures

      # Smoke tests run under paratest --processes=4, which sets TEST_TOKEN per worker
      # so each connects to meetAgain_testN. Clone the canonical meetAgain_test (with its
      # fixtures already loaded) into the four worker DBs, mirroring bin/test-db-clone.sh.
      - name: Clone test database for paratest workers
        run: |
          mysqldump -h127.0.0.1 -uroot -proot --no-tablespaces --single-transaction --quick --set-gtid-purged=OFF meetAgain_test > /tmp/test-template.sql
          for i in 1 2 3 4; do
            mysql -h127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS meetAgain_test${i} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
            mysql -h127.0.0.1 -uroot -proot "meetAgain_test${i}" < /tmp/test-template.sql
          done

      - name: Run functional tests
        run: vendor/bin/phpunit -c tests/config/phpunit.xml --testsuite=functional --no-coverage

      - name: Warm cache for smoke tests
        run: php bin/console cache:warmup --env=test --quiet

      - name: Run smoke tests
        run: vendor/bin/paratest -c tests/config/phpunit.xml --testsuite=smoke --processes=4 --functional --no-coverage

  checks:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: gd, apcu, intl

      - name: Cache Composer packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Setup config
        run: |
          cp config/plugins.dist.php config/plugins.php
          cp .env.dist .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Validate composer
        run: composer validate --strict

      - name: Mago lint
        run: vendor/bin/mago --config tests/config/mago.toml lint

      - name: Mago analyze
        run: vendor/bin/mago --config tests/config/mago.toml analyze

      - name: Mago guard
        run: vendor/bin/mago --config tests/config/mago.toml guard

      - name: GET-route purity check
        run: php bin/check-get-routes.php
