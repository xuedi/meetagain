# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $kernelProjectDir: '%kernel.project_dir%'
            string $environment: '%kernel.environment%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/Activity/UnknownActivityMessage.php'
            - '../src/Service/Security/LoadtestBypass.php'
            - '../src/Entity/'
            - '../src/Security/Permission/Attribute/'

    # Load-test bypass: when the X-Loadtest-Bypass header is set in non-prod env,
    # these decorators short-circuit the rate limiters so synthetic load traffic
    # doesn't lock itself out. Attack-test scripts deliberately omit the header
    # so the underlying limiters still fire and trigger SecurityService.
    loadtest_bypass.limiter.password_reset:
        class: App\Service\Security\LoadtestBypassRateLimiterFactory
        decorates: limiter.password_reset
        arguments:
            $inner: '@.inner'
            $requestStack: '@request_stack'
            $environment: '%kernel.environment%'
    loadtest_bypass.limiter.registration:
        class: App\Service\Security\LoadtestBypassRateLimiterFactory
        decorates: limiter.registration
        arguments:
            $inner: '@.inner'
            $requestStack: '@request_stack'
            $environment: '%kernel.environment%'
    loadtest_bypass.limiter.support:
        class: App\Service\Security\LoadtestBypassRateLimiterFactory
        decorates: limiter.support
        arguments:
            $inner: '@.inner'
            $requestStack: '@request_stack'
            $environment: '%kernel.environment%'
    loadtest_bypass.security.login_throttling:
        class: App\Service\Security\LoadtestBypassRequestRateLimiter
        decorates: security.login_throttling.main.limiter
        arguments:
            $inner: '@.inner'
            $environment: '%kernel.environment%'

    Doctrine\Migrations\DependencyFactory:
        alias: 'doctrine.migrations.dependency_factory'

    Redis:
        class: Redis
        factory: ['Symfony\Component\Cache\Adapter\RedisAdapter', 'createConnection']
        arguments:
            - '%env(REDIS_URL)%'

    Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler:
        arguments:
            - '@Redis'

    App\DataFixtures\:
        resource: '../src/DataFixtures/'
        exclude:
            - '../src/DataFixtures/AbstractFixture.php'
        tags:
            - { name: 'doctrine.fixture.orm.class' }

    Sentry\SentryBundle\Monolog\LogsHandler:
        arguments:
            - !php/const Monolog\Logger::INFO

    Sentry\Monolog\Handler:
        arguments:
            $hub: '@Sentry\State\HubInterface'
            $level: !php/const Monolog\Logger::ERROR

    App\AssetMapper\OpaqueMediaPathResolver:
        decorates: asset_mapper.public_assets_path_resolver

    App\Controller\SecurityController:
        arguments:
            $passwordResetLimiter: '@limiter.password_reset'
            $registrationLimiter: '@limiter.registration'
