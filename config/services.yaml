# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $kernelProjectDir: '%kernel.project_dir%'
            string $environment: '%kernel.environment%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    Doctrine\Migrations\DependencyFactory:
        alias: 'doctrine.migrations.dependency_factory'

    Redis:
        class: Redis
        factory: ['Symfony\Component\Cache\Adapter\RedisAdapter', 'createConnection']
        arguments:
            - '%env(REDIS_URL)%'

    Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler:
        arguments:
            - '@Redis'

    App\DataFixtures\:
        resource: '../src/DataFixtures/'
        exclude:
            - '../src/DataFixtures/AbstractFixture.php'
        tags:
            - { name: 'doctrine.fixture.orm.class' }

    App\Service\FixturesLoaderInterface:
        class: App\Service\SymfonyFixturesLoaderAdapter
        arguments:
            - '@doctrine.fixtures.loader'

    App\Authorization\Action\ActionAuthorizationService:
        arguments:
            $providers: !tagged_iterator app.action_authorization

    App\Authorization\Action\ActionAuthorizationMessageService:
        arguments:
            $providers: !tagged_iterator app.action_authorization_message

    Sentry\SentryBundle\Monolog\LogsHandler:
        arguments:
            - !php/const Monolog\Logger::INFO

    App\Controller\SecurityController:
        arguments:
            $passwordResetLimiter: '@limiter.password_reset'
            $registrationLimiter: '@limiter.registration'
