framework:
    html_sanitizer:
        sanitizers:
            cms.content:
                allow_safe_elements: false
                allow_relative_links: true
                allow_relative_medias: false
                allow_elements:
                    # Text structure
                    p: []
                    div: []
                    br: []
                    hr: []
                    # Headings
                    h1: []
                    h2: []
                    h3: []
                    h4: []
                    h5: []
                    h6: []
                    # Inline formatting
                    strong: []
                    b: []
                    em: []
                    i: []
                    u: []
                    s: []
                    small: []
                    sup: []
                    sub: []
                    # Lists
                    ul: []
                    ol: []
                    li: []
                    # Tables
                    table: []
                    thead: []
                    tbody: []
                    tfoot: []
                    tr: []
                    th: []
                    td: []
                    caption: []
                    # Links — href allowed, but javascript: is blocked by default
                    a: [href, rel, target]
                    # Quotes
                    blockquote: []
                    cite: []
                    # Code
                    code: []
                    pre: []
            # Inline emphasis only - tool-generated message/support content (no links, no attributes).
            message.content:
                allow_safe_elements: false
                allow_elements:
                    strong: []
                    b: []
                    em: []
                    i: []
                    br: []
            # Keep the visible text of any safe element; callers strip the tags to get plain text.
            message.plain:
                allow_safe_elements: true
