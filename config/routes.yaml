controllers:
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: '[a-z]{2}'
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    exclude: ../src/Controller/NonLocale/

frontpage:
    type: attribute
    resource: ../src/Controller/NonLocale/FrontpageController.php

set_session_locale:
    type: attribute
    resource: ../src/Controller/NonLocale/SetSessionLocaleController.php

ajax:
    type: attribute
    resource: ../src/Controller/NonLocale/AjaxController.php

robots:
    type: attribute
    resource: ../src/Controller/NonLocale/RobotsController.php

sitemap:
    type: attribute
    resource: ../src/Controller/NonLocale/SitemapController.php

indexnow:
    type: attribute
    resource: ../src/Controller/NonLocale/IndexNowController.php
