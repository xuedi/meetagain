# Mago configuration file
# For more information, see https://mago.carthage.software/#/getting-started/configuration
php-version = "8.4"

[source]
# Wildcard pattern automatically includes all plugins
# Uses recursive glob to match all PHP files in any plugin's src directory
paths = [
    "plugins/**/src/**/*.php",
    "src/",
    "tests/"
]
includes = ["vendor"]
excludes = []

[formatter]
print-width = 120
tab-width = 4
use-tabs = false

[linter]
integrations = ["symfony", "php-unit"]

[linter.rules.too-many-methods]
threshold = 12

[linter.rules.kan-defect]
threshold = 2.0

[analyzer]

[guard]
