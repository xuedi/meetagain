# Mago configuration file
# For more information, see https://mago.carthage.software/#/getting-started/configuration
php-version = "8.4"

[source]
paths = [
    "plugins/**/src/**/*.php",
    "src/",
    "tests/"
]
includes = ["vendor"]
excludes = []

[formatter]
print-width = 120
tab-width = 4
use-tabs = false

[linter]
integrations = ["symfony", "php-unit"]

[analyzer]

[guard]
