# Mago configuration file
# For more information, see https://mago.carthage.software/#/getting-started/configuration
php-version = "8.4"

[source]
# NOTE: Mago does not support wildcards (plugins/*/src/ won't work)
# If plugins are added/removed, update this list manually
# MultiSite plugin is excluded (not in base repo)
paths = [
    "plugins/bookclub/src/",
    "plugins/dishes/src/",
    "plugins/filmclub/src/",
    "plugins/glossary/src/",
    "plugins/karaoke/src/",
    "src/",
    "tests/"
]
includes = ["vendor"]
excludes = []

[formatter]
print-width = 120
tab-width = 4
use-tabs = false

[linter]
integrations = ["symfony", "php-unit"]

[analyzer]

[guard]
