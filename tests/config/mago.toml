# Mago configuration file
# For more information, see https://mago.carthage.software/#/getting-started/configuration
php-version = "8.4"

[source]
paths = [
    "plugins/bookclub/src/**/*.php",
    "plugins/dinnerclub/src/**/*.php",
    "plugins/filmclub/src/**/*.php",
    "plugins/glossary/src/**/*.php",
    "plugins/karaoke/src/**/*.php",
    "src/",
    "tests/",
    "stubs/",
]
includes = ["vendor"]
excludes = []

[formatter]
print-width = 120
tab-width = 4
use-tabs = false

[linter]
integrations = ["symfony", "php-unit"]

# Raised from default 12 — controllers, services and test classes legitimately accumulate methods
[linter.rules.too-many-methods]
threshold = 45

# Raised from default 5 — Symfony forms and commands commonly exceed 5 params
[linter.rules.excessive-parameter-list]
threshold = 20

# Raised from default 15 — real code, not greenfield
[linter.rules.cyclomatic-complexity]
threshold = 150

# Raised — entities with many fields are normal in this domain
[linter.rules.too-many-properties]
threshold = 30

# Raised — large enums exist for country codes etc.
[linter.rules.too-many-enum-cases]
threshold = 100

# Raised from default 2.0 — too strict for existing codebase
[linter.rules.kan-defect]
threshold = 10.0

# Disabled — all hits are test passwords/fixture data, not real credentials
[linter.rules.no-literal-password]
enabled = false

# Disabled — 412 hits, penalises a common readable pattern with named arguments
[linter.rules.literal-named-argument]
enabled = false

# Disabled — isset() is idiomatic PHP, not a code smell
[linter.rules.no-isset]
enabled = false

# Disabled — ?: is common shorthand, not confusing
[linter.rules.no-shorthand-ternary]
enabled = false

# Disabled — Halstead complexity is too academic for this codebase
[linter.rules.halstead]
enabled = false

# Disabled — TODO comments are tracked; not a linter concern
[linter.rules.tagged-todo]
enabled = false

# Disabled — assertion style is a test team preference, not enforced here
[linter.rules.assertion-style]
enabled = false

# Disabled — entity setters, test data providers, and service flags with bool params are idiomatic
[linter.rules.no-boolean-flag-parameter]
enabled = false

# Disabled — strict assertions debatable for this test suite
[linter.rules.strict-assertions]
enabled = false

# Disabled — strict behaviour rules are too opinionated for now
[linter.rules.strict-behavior]
enabled = false

# Disabled — readable literal checks are too pedantic for existing code
[linter.rules.readable-literal]
enabled = false

# Disabled — nested ternaries exist in templates/legacy code
[linter.rules.no-nested-ternary]
enabled = false

# Disabled — assert descriptions not required in this project
[linter.rules.assert-description]
enabled = false

# Disabled — test files commonly contain inline helper stubs alongside the test class
[linter.rules.single-class-per-file]
enabled = false

[analyzer]
# tests/ excluded: the linter already covers tests for style/structure. The analyzer
# produces PHPUnit false positives (createMock/createStub return MockObject&T which
# mago reports as non-existent-method and invalid-callable).
excludes = [
    # tests/ excluded: linter already covers tests; analyzer false positives from PHPUnit mocking.
    "tests/",
]

ignore = [
    # mixed-* — require full type annotation of the codebase (Symfony form getData(),
    # Doctrine meta arrays, etc.). Separate typing project.
    "mixed-assignment",
    "mixed-method-access",
    "mixed-array-access",
    "mixed-array-assignment",
    "mixed-argument",
    "mixed-return-statement",
    "mixed-operand",
    "mixed-property-access",
    "mixed-property-type-coercion",
    "mixed-clone",

    # Downstream effects of mixed-* — all resolve to `mixed` type.
    "invalid-callable",
    "invalid-destructuring-source",

    # possibly-null-* / possible-*-null / possibly-false-* — require systematic null-safety
    # refactor (nullable Doctrine relations, optional Symfony services, getId() before flush).
    # Real issues but a separate null-safety project.
    "possibly-null-argument",
    "possible-method-access-on-null",
    "possibly-null-array-access",
    "possibly-null-array-index",
    "possibly-null-operand",
    "possibly-null-iterator",
    "possibly-null-property-access",
    "possibly-false-argument",
    "possibly-false-operand",
    "possibly-false-iterator",

    # Downstream effects of null-* — return types involving null flow.
    "invalid-return-statement",
    "nullable-return-statement",

    # Type precision — separate project, not runtime bugs.
    "less-specific-nested-argument-type",
    "less-specific-argument",
    "less-specific-return-statement",
    "less-specific-nested-return-statement",

    # Requires intersection type support — separate project.
    "ambiguous-object-method-access",
    "ambiguous-object-property-access",

    # invalid-iterator when type is mixed — downstream of mixed-* (Doctrine raw queries,
    # untyped arrays). The nonnull variant requires explicit array shape annotations.
    "invalid-iterator",

    # invalid-type-cast — intentional (array) and (float) casts on mixed JSON payload
    # fields in API controllers and ImportService. Downstream of mixed-typing.
    "invalid-type-cast",

    # possibly-static-access-on-interface — BlockHydrator and CmsBlockType intentionally
    # call static methods via class-string<Interface>; all concrete classes implement them.
    "possibly-static-access-on-interface",

    # template-constraint-violation — Enum::getTranslatedList() returns mixed; fixing
    # requires adding generic @return annotations throughout enum classes.
    "template-constraint-violation",

    # Style preferences — not bugs.
    "non-documented-method",
    "non-documented-property",
]

[guard]
