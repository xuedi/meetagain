services:

  # Main PHP application server (FrankenPHP with Caddy)
  php:
    build: php
    container_name: "ma-php"
    user: ${HOST_UID}:${HOST_GID}
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
      - "443:443/udp" # HTTP/3
    volumes:
      - ../:/var/www/html/
      - ./php/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./certs:/certs:ro
      - ma-caddy_data:/data
      - ma-caddy_config:/config
    environment:
      - UID=${HOST_UID}
      - GID=${HOST_GID}
      - USERNAME=${HOST_USERNAME}
      - REDIS_URL=redis://valkey:6379
    depends_on:
      - valkey
    tty: true

  # Database server
  mariadb:
    image: mariadb:12.3.2@sha256:b1c7bf836e64ed9406a8984af29509f40089d55cea14b32f12c4726a1f17104b
    container_name: "ma-db"
    volumes:
      - ma-mysql-data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_HOST=${MARIADB_HOST}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}

  # Mail catcher for development (UI at localhost:8025)
  mailhog:
    container_name: "ma-mailhog"
    image: mailhog/mailhog:v1.0.1@sha256:8d76a3d4ffa32a3661311944007a415332c4bb855657f4f6c57996405c009bea
    user: ${HOST_UID}:${HOST_GID}
    ports:
      - "1025:1025"
      - "8025:8025"

  # Redis-compatible cache server
  valkey:
    container_name: "ma-valkey"
    image: valkey/valkey:9.1@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - ma-valkey-data:/data

  # Accessibility testing tool (run via: just checkA11y)
  pa11y:
    build: pa11y
    container_name: "ma-pa11y"
    network_mode: "host"

  # PHP server in prod mode for benchmarking (run via: just testPerformance)
  php-bench:
    build: php
    container_name: "ma-php-bench"
    user: ${HOST_UID}:${HOST_GID}
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ../:/var/www/html/
      - ./php/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./certs:/certs:ro
    environment:
      - UID=${HOST_UID}
      - GID=${HOST_GID}
      - USERNAME=${HOST_USERNAME}
      - REDIS_URL=redis://valkey:6379
      - APP_ENV=prod
    depends_on:
      - valkey
    profiles:
      - tools

  # Load and attack testing tool (run via: just testLoad / just testAttack)
  loadtest:
    image: grafana/k6:2.0.0@sha256:a33a0cfdc4d2483d6b7a3a22e726a499ff2831a671a49239104cd34a9937523c
    container_name: "ma-loadtest"
    network_mode: "host"
    user: ${HOST_UID}:${HOST_GID}
    volumes:
      - ../tests/loadtest:/scripts:ro
      - ../tests/reports:/reports
    environment:
      - K6_WEB_DASHBOARD=true
    profiles:
      - tools

  # Page speed analyzer (run via: just testPerformance)
  sitespeed:
    image: sitespeedio/sitespeed.io:41.4.1@sha256:4c755cd46238636b7b80adeec8f54936e416a3dcc3f04279192096d2a1d861ee
    container_name: "ma-sitespeed"
    network_mode: "host"
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - ../tests/reports/performance:/sitespeed.io
    command: http://localhost:8080/en http://localhost:8080/en/events http://localhost:8080/en/members http://localhost:8080/en/about
    profiles:
      - tools

volumes:
  ma-mysql-data:
  ma-caddy_data:
  ma-caddy_config:
  ma-valkey-data: