<h1>Hello {{username}}!</h1>

<p>
    This is a friendly reminder that <b>{{eventTitle}}</b> is happening today<br>
    at <b>{{eventLocation}}</b> at <b>{{eventTime}}</b>.
</p>
<p>
    You can view the event details
    <a href="{{host}}/{{lang}}/event/{{eventId}}">here</a>.
</p>
<p>
    If you no longer wish to receive event reminders, you can turn them off in your
    <a href="{{host}}/{{lang}}/profile/config/">notification settings</a>.
</p>
<p>
    Cheers,<br>
    {{greeting}}
</p>
