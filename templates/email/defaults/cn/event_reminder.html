<h1>您好 {{username}}！</h1>

<p>
    温馨提醒，活动 <b>{{eventTitle}}</b> 将于今天举行，<br>
    地点：<b>{{eventLocation}}</b>，时间：<b>{{eventTime}}</b>。
</p>
<p>
    您可以<a href="{{host}}/{{lang}}/event/{{eventId}}">点击这里</a>查看活动详情。
</p>
<p>
    如果您不想再收到活动提醒，可以在
    <a href="{{host}}/{{lang}}/profile/config/">通知设置</a>中关闭。
</p>
<p>
    祝好，<br>
    {{greeting}}
</p>
