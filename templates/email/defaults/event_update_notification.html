<h1>Hello {{username}}!</h1>

<p>
    There has been a change to the event <b>{{eventTitle}}</b> you plan to attend:
</p>

{{changesHtml}}

<p>
    You can view the event details <a href="{{host}}/{{lang}}/event/{{eventId}}">here</a>.
</p>
<p>
    If you don't like to receive this notification, you can<br>
    switch them off in your <a href="{{host}}/{{lang}}/profile/config/">settings</a>
</p>

<p>
    Cheers,<br>
    {{greeting}}
</p>
